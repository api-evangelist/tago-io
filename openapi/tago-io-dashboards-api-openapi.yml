                        type: array
                        items:
                          type: object
                          properties:
                            height:
                              type: number
                              example: 3
                            tab:
                              example: null
                            widget_id:
                              type: string
                              example: 6230e740f5772600124c81e1
                            width:
                              type: number
                              example: 1
                            x:
                              type: number
                              example: 0
                            y:
                              type: number
                              example: 0
                        example:
                        - height: 3
                          tab: null
                          widget_id: 6230e740f5772600124c81e1
                          width: 1
                          x: 0
                          y: 0
                        - height: 3
                          tab: null
                          widget_id: 6230e75df5772600124c81e2
                          width: 1
                          x: 1
                          y: 0
                        - height: 3
                          tab: null
                          widget_id: 6230e44cf5772600124c81de
                          width: 1
                          x: 2
                          y: 0
                        - height: 3
                          tab: null
                          widget_id: 6230e84df5772600124c81e7
                          width: 2.3333333333333335
                          x: 0.3333333333333333
                          y: 7
                        - height: 5
                          tab: null
                          widget_id: 62750cf1253eb800126aefc0
                          width: 2
                          x: 2.666666666666667
                          y: 7
                      background:
                        type: object
                        properties: {}
                      blueprint_device_behavior:
                        example: null
                      blueprint_devices:
                        type: array
                        items:
                          type: object
                          properties:
