specification: API Commons Rate Limits
specificationVersion: '0.1'
provider: TagoIO
providerId: tago-io
created: '2026-06-12'
modified: '2026-06-12'
reconciled: true
url: https://docs.tago.io/docs/tagoio/profiles/services/rate-limits-hard-limits
notes: >
  Rate limits are enforced per minute and reset at the start of each 60-second
  window (not rolling). If you reach the limit at 12:45:09 PM, the next request
  is permitted after 12:46:00 PM. Limits vary by plan tier: Free, Starter, Scale.
  Enterprise (TagoDeploy) has fully customizable rate limits.
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  throttledMessage: Too Many Requests
limits:
  - scope: account
    metric: data-get-post
    endpoint: /data
    methods:
      - GET
      - POST
    timeFrame: minute
    description: Requests to get or send device data
    tiers:
      - plan: Free
        limit: 250
        unit: rpm
      - plan: Starter
        limit: 5000
        unit: rpm
      - plan: Scale
        limit: 15000
        unit: rpm

  - scope: account
    metric: device-create
    endpoint: /device
    methods:
      - POST
    timeFrame: minute
    description: Create new device
    tiers:
      - plan: Free
        limit: 10
        unit: rpm
      - plan: Starter
        limit: 250
        unit: rpm
      - plan: Scale
        limit: 5000
        unit: rpm

  - scope: account
    metric: device-list
    endpoint: /device
    methods:
      - GET
    timeFrame: minute
    description: List devices
    tiers:
      - plan: Free
        limit: 50
        unit: rpm
      - plan: Starter
        limit: 100
        unit: rpm
      - plan: Scale
        limit: 500
        unit: rpm

  - scope: account
    metric: analysis-write
    endpoint: /analysis
    methods:
      - POST
      - PUT
      - DELETE
    timeFrame: minute
    description: Create, update, or delete analysis scripts
    tiers:
      - plan: Free
        limit: 60
        unit: rpm
      - plan: Starter
        limit: 100
        unit: rpm
      - plan: Scale
        limit: 1000
        unit: rpm

  - scope: account
    metric: dashboard-write
    endpoint: /dashboard
    methods:
      - POST
      - PUT
      - DELETE
    timeFrame: minute
    description: Create, update, or delete dashboards
    tiers:
      - plan: Free
        limit: 60
        unit: rpm
      - plan: Starter
        limit: 100
        unit: rpm
      - plan: Scale
        limit: 1000
        unit: rpm

  - scope: account
    metric: mqtt-publish-subscribe
    protocol: MQTT
    timeFrame: minute
    description: MQTT publish and subscribe operations
    tiers:
      - plan: Free
        limit: 250
        unit: rpm
      - plan: Starter
        limit: 5000
        unit: rpm
      - plan: Scale
        limit: 15000
        unit: rpm

  - scope: account
    metric: mqtt-connection
    protocol: MQTT
    timeFrame: minute
    description: MQTT broker connection attempts
    tiers:
      - plan: Free
        limit: 20
        unit: rpm
      - plan: Starter
        limit: 100
        unit: rpm
      - plan: Scale
        limit: 200
        unit: rpm
