    post:
      tags:
      - Devices
      summary: Send Device Data
      description: 'Send data to a specific Device within your profile

        '
      operationId: sendDataToDevice
      security:
      - Device-Token: []
      requestBody:
        $ref: '#/components/requestBodies/DeviceDataBody'
      responses:
        '200':
          description: Sending data
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: 2 Data Added
                  status:
                    type: boolean
                    example: true
    put:
      tags:
      - Devices
      summary: Edit Device Data
      description: "Edit specific data stored in the device.\n:::info  \nThis request is only available when using Mutable Storage on Devices  \n:::"
      operationId: editDeviceData
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: 653aa3ab617c10000990718f
                value:
                  type: number
                  example: 20
            examples:
              Edit Device Data:
                value:
                  id: 653aa3ab617c10000990718f
                  value: 20
      responses:
        '200':
          description: Editing a device data
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: 1 item(s) updated
                  status:
                    type: boolean
                    example: true
              examples:
                Editing a device data:
                  value:
                    result: 1 item(s) updated
                    status: true
    delete:
      tags:
      - Devices
      summary: Delete Device Data
      description: "Delete specific data stored in the device.\n:::info  \nThis request is only available when using Mutable Storage on Devices  \n:::"
      operationId: deleteDeviceData
      parameters:
      - $ref: '#/components/parameters/DeleteFilterQty'
      - $ref: '#/components/parameters/DeleteFilterOrdination'
      - $ref: '#/components/parameters/DeleteFilterSkip'
      - $ref: '#/components/parameters/DeleteFilterVariables'
      - $ref: '#/components/parameters/DeleteFilterValues'
      - $ref: '#/components/parameters/DeleteFilterIds'
      - $ref: '#/components/parameters/DeleteFilterGroups'
      responses:
        '200':
          description: Delete Device Data
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string
                    example: 1 Data Removed
                  status:
                    type: boolean
                    example: true
components:
  schemas:
    DeviceDataItem:
      type: object
      required:
      - variable
      properties:
        variable:
          type: string
          example: location
        location:
          type: object
          properties:
            lat:
              type: number
              example: 35.770723
            lng:
              type: number
              example: -78.677328
        value:
          type: string
          example: TagoIO Headquarters
        time:
          type: string
          description: ISO 8601 string or Unix timestamp
          example: '2023-12-01T12:34:56.000Z'
        group:
          type: string
          description: Unique grouping ID for your data. Widgets often group by this.
        unit:
          type: string
          example: '%'
          description: Provide a unit of measurement to the data. Most widgets will display the unit.
        metadata:
          type: object
          description: Can be attached to the data to influence widget behavior and store additional information.
          additionalProperties: true
          example:
            color: red
            icon: car
    DeviceDataArray:
      type: array
      items:
        $ref: '#/components/schemas/DeviceDataItem'
      description: Accepts a single item or an array of items.
    DeviceData:
      description: 'Accepts a single item or an array of items when sent as application/json.

        For text/plain content, use the [Payload Parser](/docs/tagoio/devices/payload-parser/) to normalize the data into TagoIO JSON format.

        '
      oneOf:
      - $ref: '#/components/schemas/DeviceDataItem'
      - $ref: '#/components/schemas/DeviceDataArray'
  requestBodies:
    DeviceDataBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeviceData'
          examples:
            Send data (object):
              value:
                variable: location
                value: TagoIO Headquarters
                location:
                  lat: 35.770723
                  lng: -78.677328
            Send data (array):
              value:
              - variable: location
                value: TagoIO Headquarters
                location:
                  lat: 35.770723
                  lng: -78.677328
              - variable: location
                value: New York Office
                location:
                  lat: 40.712776
                  lng: -74.005974
        text/plain:
          schema:
            type: string
            description: Raw text data that will be processed by the device's Payload Parser to normalize into TagoIO JSON format.
          examples:
            Raw sensor data:
              value: temperature:23.5,humidity:45.2,battery:87
            HEX payload:
              value: 41BC7E1F2A
            Custom format:
              value: sensor_id=123&temp=25.6&status=ok
  parameters:
    DeleteFilterIds:
      name: ids
      in: query
      description: Filter data by id. Accepts single or multiple values.
      schema:
        type: string
        items:
          type: string
        example: 6144a25e280ad80019688e689
    DeleteFilterOrdination:
      name: ordination
      in: query
      description: Sort direction. Default is descending.
      schema:
        type: string
        enum:
        - ascending
        - descending
        default: descending
        example: descending
    DeleteFilterQty:
      name: qty
      in: query
      description: Quantity of data records to delete. Default is 15.
      schema:
        type: integer
        minimum: 1
        default: 15
        example: 20
    DeleteFilterVariables:
      name: variables
      in: query
      description: Filter data by variable.
      schema:
        type: string
        example: temperature
    DeleteFilterGroups:
      name: groups
      in: query
      description: 'Filter data by group. Accepts single or multiple values.

        For multiple, send `groups[0]=foo&groups[1]=bar`.

        '
      schema:
        type: string
        items:
          type: string
        example: '16731887966346'
    DeleteFilterSkip:
      name: skip
      in: query
      description: Number of items to skip (pagination).
      schema:
        type: integer
        minimum: 0
        example: 15
    DeleteFilterValues:
      name: values
      in: query
      description: Filter data by value. Accepts single or multiple values.
      schema:
        type: string
        items:
          type: string
        example: '12'
  securitySchemes:
    Device-Token:
      type: apiKey
      description: A Device-Token that is unique to your device. Generate a token by accessing your Device's page.
      name: Device-Token
      in: header
      x-example: 5e12345a-d70a-4e2d-b83d-5c0123456789
    Network-Token:
      type: apiKey
      description: A Network Token that is unique to your Network. Access Integrations > Network > Tokens to generate a token for your Network.
      name: Token
      in: header
      x-DisplayName: Network-Token
      x-example: fd549ad2-813c-4d66-bf72-508e5b98afe3
    Profile-Token:
      type: apiKey
      description: A Profile token that is unique to your entire profile. Generate in your account settings.
      name: Profile-Token
      in: header
      x-example: a15ea5ea-dd2d-4c63-8945-92b54da4772a
