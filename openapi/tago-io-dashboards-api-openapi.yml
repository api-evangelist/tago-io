                              type: array
                              items:
                                type: object
                                properties:
                                  key:
                                    type: string
                                    example: kmutable
                                  value:
                                    type: string
                                    example: vmutable
                              example:
                              - key: kmutable
                                value: vmutable
                            filter_conditions:
                              type: array
                              items: {}
                              example: []
                            id:
                              type: string
                              example: 6230e392f5772600124c81db
                            name:
                              type: string
                              example: mutable_device
                        example:
                        - conditions:
                          - key: kmutable
                            value: vmutable
                          filter_conditions: []
                          id: 6230e392f5772600124c81db
                          name: mutable_device
                        - conditions:
                          - key: kimmutable
                            value: vimmutable
                          filter_conditions: []
                          id: 6230e42af5772600124c81dc
                          name: immutable_device
                        - conditions:
                          - key: klegacy
                            value: vlegacy
                          filter_conditions: []
                          id: 6230e42af5772600124c81dd
                          name: legacy_device
                      blueprint_selector_behavior:
                        example: null
                      created_at:
                        type: string
                        example: '2022-03-15T19:05:54.839Z'
                      group_by:
                        type: array
                        items: {}
                        example: []
                      icon:
                        type: object
                        properties: {}
                      id:
                        type: string
                        example: 6230e392f5772600124c81da
                      label:
                        type: string
                        example: Device Types Blueprint
                      last_access:
                        type: string
                        example: '2022-06-21T11:51:07.642Z'
                      setup:
                        type: object
                        properties: {}
                      tabs:
                        type: array
                        items: {}
