apis:
  - aid: tago-io:tago-io-rest-api
    name: TagoIO REST API
    description: >
      The TagoIO REST API provides full programmatic access to the TagoIO IoT
      platform, covering device management, device data ingestion and retrieval,
      dashboards and widgets, analysis scripts, file management, access control
      policies, entities, and account/profile operations. Regional endpoints are
      available for US East and Europe West regions.
    humanURL: https://docs.tago.io/docs/tagoio/api/api_overview
